server:
  port: 8080

spring:
  application:
    name: altis-erp
  datasource:
    url: jdbc:postgresql://localhost:5432/altis_erp
    username: postgres
    password: admin
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics